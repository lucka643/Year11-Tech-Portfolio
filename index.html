<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Toys &amp; Games · Year 11 Design Technology · Luca Carlisle</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Familjen+Grotesk:ital,wght@0,400..700;1,400..600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css?v=34" />
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<!-- Animated WebGL fog background (kept from v1) -->
<canvas id="fog"></canvas>
<div class="grain"></div>

<!-- Fixed HUD -->
<header class="hud">
  <div class="hud-left">
    <button class="hud-home" id="hudHome" aria-label="Go to home">
      <span class="hud-mark">◆</span>
      <span class="hud-name">LUCA&nbsp;CARLISLE</span>
    </button>
    <button class="hud-back" id="hudBack" aria-label="Back">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
      <span>BACK</span>
    </button>
  </div>
  <div class="hud-right">
    <span class="hud-course">DES·TECH / YR11</span>
  </div>
</header>

<!-- Scroll progress (section pages) -->
<div class="progress" id="progress"><i></i></div>

<!-- App root: views are rendered in here -->
<main id="app"></main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" hidden>
  <img alt="" />
  <button class="lightbox-x" aria-label="Close">✕</button>
</div>

<script src="js/fog.js?v=34"></script>
<script src="js/content.js?v=34"></script>
<script src="js/home.js?v=34"></script>
<script src="js/section.js?v=34"></script>
<script src="js/router.js?v=34"></script>
</body>
</html>
